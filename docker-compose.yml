services:
  app:
    build: .
    ports:
      - "127.0.0.1:${PORT:-8080}:80"
    environment:
      docker: "true"
    volumes:
      # Live code: edit on the host, changes show up in the container instantly.
      - .:/var/www/html
      # Composer installs into this volume inside the container, so your host
      # PHP version is irrelevant and host files stay clean.
      - vendor:/var/www/html/vendor
    restart: unless-stopped

volumes:
  vendor:
